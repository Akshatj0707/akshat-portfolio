# render.yaml — Render.com Blueprint
# One Web Service: Express serves API + static frontend together

services:
  - type: web
    name: akshat-portfolio
    runtime: node
    region: singapore          # Closest free-tier region to India
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false            # ← Set manually in Render Environment tab
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure value
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false
